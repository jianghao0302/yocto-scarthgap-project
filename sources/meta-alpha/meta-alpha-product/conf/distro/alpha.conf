DISTRO = "alpha"
DISTRO_NAME = "ALPHA Embedded Linux"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "scarthgap-based"

# Vendor identifiers
# NOTE: Do NOT use "-alpha" here - glibc configure interprets "alpha" in the
# vendor field as DEC Alpha CPU architecture and injects Alpha-specific flags
# (-mieee, -mfp-rounding-mode=d) which are invalid for ARM cross-compiler.
TARGET_VENDOR = "-alphadistro"
SDK_VENDOR = "-alphasdk"

# Use systemd as default init manager (more modern than sysvinit)
INIT_MANAGER = "systemd"

# Default distro features for generic embedded products
# ipv4 ipv6: Network stack
# systemd: Init system
# pam: Pluggable authentication modules
# selinux: Security (optional for embedded)
DISTRO_FEATURES_DEFAULT = "ipv4 ipv6 systemd pam"
ALPHA_DEFAULT_DISTRO_FEATURES = ""
DISTRO_FEATURES ?= "${DISTRO_FEATURES_DEFAULT} ${ALPHA_DEFAULT_DISTRO_FEATURES}"

# Package management format (DEB for smaller footprint, RPM for enterprise)
PACKAGE_CLASSES ?= "package_deb"

# Image formats: rootfs archives + filesystem images
# ext4: Raw ext4 filesystem (for flashing or further processing)
# tar.gz: Compressed rootfs tarball
# tar.bz2: tar with bzip2 compression
# cpio.gz: Initramfs-style compressed archive
IMAGE_FSTYPES ?= "ext4 tar.gz"

# SDK configuration
SDK_NAME = "${DISTRO}-${TCLIBC}-${SDKMACHINE}-${IMAGE_BASENAME}-${TUNE_PKGARCH}-${MACHINE}"
SDKPATHINSTALL = "/opt/${DISTRO}/${DISTRO_VERSION}"

# Standard toolchain libraries
TCLIBCAPPEND = ""

# Extra packages/features inherited by all images using this distro
DISTRO_EXTRA_RDEPENDS ?= ""
DISTRO_EXTRA_RRECOMMENDS ?= ""

# Security and quality assurance settings
INHERIT += "sanity"

# Signature handling for build reproducibility
BB_SIGNATURE_HANDLER ?= "OEEquivHash"
BB_HASHSERVE ??= "auto"

# SPDX/licensing support
INHERIT += "spdx-common"

# Disable static libraries by default (reduces image size)
STATIC_LIBRARIES = "ncurses gnutls"
DISABLE_STATIC = "1"

# License manifests for compliance
INHERIT += "license"
